<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SigMaker — Email Signature Generator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f8f6f2;
      color: #1a1a1a;
      padding: 40px 20px;
    }
    .container { max-width: 960px; margin: 0 auto; }

    header { text-align: center; margin-bottom: 48px; }
    header h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.5px; }
    header h1 span { background: linear-gradient(135deg, #c9a84c, #b8952e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    header p { color: #888; font-size: 14px; margin-top: 6px; }

    .layout { display: flex; gap: 24px; align-items: flex-start; }
    @media (max-width: 700px) { .layout { flex-direction: column; } }

    .panel {
      flex: 1;
      background: #fff;
      border: 1px solid #e8e4dc;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 1px 3px rgba(201,168,76,0.06);
    }
    .panel h2 {
      font-size: 13px;
      font-weight: 600;
      color: #c9a84c;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 20px;
    }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; font-weight: 500; color: #666; margin-bottom: 4px; }
    .form-group input, .form-group select {
      width: 100%; padding: 10px 14px; font-size: 14px; font-family: inherit;
      border: 1px solid #ddd; border-radius: 8px; background: #faf9f6; outline: none; transition: border 0.2s;
    }
    .form-group input:focus, .form-group select:focus { border-color: #c9a84c; background: #fff; }

    .theme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
    .theme-btn { cursor: pointer; }
    .theme-btn input { display: none; }
    .theme-btn label {
      display: block; padding: 10px; border-radius: 8px; border: 2px solid #e8e4dc;
      font-size: 11px; font-weight: 500; color: #888; cursor: pointer;
      transition: all 0.2s; text-align: center;
    }
    .theme-btn input:checked + label { border-color: #c9a84c; color: #1a1a1a; background: #faf6ee; }
    .theme-btn label:hover { border-color: #c9a84c; }

    .preview-box { margin-top: 16px; padding: 20px; background: #faf9f6; border: 1px solid #e8e4dc; border-radius: 8px; min-height: 100px; }

    .tabs { display: flex; gap: 4px; margin: 16px 0 0; }
    .tab-btn {
      padding: 8px 16px; font-size: 12px; font-weight: 500;
      border: 1px solid #e8e4dc; border-radius: 8px 8px 0 0;
      background: #f5f3ee; cursor: pointer; color: #888; font-family: inherit;
      transition: all 0.2s; border-bottom: none;
    }
    .tab-btn.active { background: #0a0a0a; color: #e0e0e0; border-color: #0a0a0a; }

    .code-block { position: relative; background: #0a0a0a; border-radius: 0 8px 8px 8px; padding: 20px; }
    .code-block code {
      font-family: 'JetBrains Mono', 'SF Mono', monospace; font-size: 12px;
      color: #e0e0e0; white-space: pre-wrap; word-break: break-all; display: block;
    }
    .copy-btn {
      position: absolute; top: 12px; right: 12px; background: #c9a84c; color: #fff;
      border: none; border-radius: 6px; padding: 6px 14px; font-size: 11px; cursor: pointer;
      font-family: inherit; font-weight: 600; transition: all 0.2s;
    }
    .copy-btn:hover { background: #b8952e; }
    .copy-btn.copied { background: #2d6a4f; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>◆ <span>SigMaker</span></h1>
      <p>Email signature generator — pick a style, fill the form, copy & paste</p>
    </header>

    <div class="layout">
      <div class="panel">
        <h2>📝 Details</h2>
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="name" value="Petr Knotek" oninput="render()">
        </div>
        <div class="form-group">
          <label>Role</label>
          <input type="text" id="role" value="Developer" oninput="render()">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" value="petr.knotek@stackmind.cz" oninput="render()">
        </div>
        <div class="form-group">
          <label>Company</label>
          <input type="text" id="company" value="StackMind s.r.o." oninput="render()">
        </div>
        <div class="form-group">
          <label>Website</label>
          <input type="text" id="website" value="stackmind.cz" oninput="render()">
        </div>

        <h2 style="margin-top: 24px;">🎨 Style</h2>
        <div class="theme-grid" id="themeGrid"></div>

        <div class="form-group">
          <label>Tagline</label>
          <input type="text" id="tagline" value="Myšlení, které prodáváme" oninput="render()">
        </div>
      </div>

      <div class="panel">
        <h2>👁 Preview</h2>
        <div class="preview-box" id="preview"></div>

        <div class="tabs">
          <button class="tab-btn active" id="tab-html" onclick="switchTab('html')">HTML</button>
          <button class="tab-btn" id="tab-plain" onclick="switchTab('plain')">Plain Text</button>
        </div>
        <div class="code-block">
          <button class="copy-btn" id="copyBtn" onclick="copyCode()">Copy</button>
          <code id="codeOutput"></code>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentTab = 'html';

    const THEMES = [
      { id: 'stackmind', name: 'StackMind', initials: 'SM', color1: '#0f3460', color2: '#16213e', accent: '#e94560', dot: '#e94560', font: "'Inter', -apple-system, sans-serif" },
      { id: 'soloventure', name: 'SoloVenture', initials: 'SV', color1: '#1b4332', color2: '#2d6a4f', accent: '#95d5b2', dot: '#2d6a4f', font: "'Inter', -apple-system, sans-serif" },
      { id: 'hightech', name: 'High-Tech Min.', initials: '▸', color1: '#1a1a1a', color2: '#333', accent: '#555', dot: '#ccc', font: "'SF Mono', 'JetBrains Mono', monospace", style: 'terminal' },
      { id: 'luxury', name: 'Luxury Gold', initials: 'L', color1: '#1a1a1a', color2: '#2a2a2a', accent: '#c9a84c', dot: '#c9a84c', font: "'Inter', -apple-system, sans-serif", style: 'luxury' },
      { id: 'corporate', name: 'Corporate', initials: 'C', color1: '#1e293b', color2: '#334155', accent: '#3b82f6', dot: '#3b82f6', font: "'Inter', -apple-system, sans-serif" },
      { id: 'dark', name: 'Dark Mode', initials: 'DM', color1: '#0a0a0a', color2: '#1a1a1a', accent: '#22d3ee', dot: '#22d3ee', font: "'Inter', -apple-system, sans-serif", style: 'dark' },
      { id: 'warm', name: 'Warm Earth', initials: 'E', color1: '#5c3d2e', color2: '#774936', accent: '#d4a373', dot: '#d4a373', font: "'Inter', -apple-system, sans-serif" },
      { id: 'tech', name: 'Tech Neon', initials: 'TN', color1: '#0a0a23', color2: '#1a1a3e', accent: '#00ff88', dot: '#00ff88', font: "'Inter', -apple-system, sans-serif", style: 'dark' },
      { id: 'startup', name: 'Startup', initials: 'S', color1: '#7c3aed', color2: '#a855f7', accent: '#fbbf24', dot: '#fbbf24', font: "'Inter', -apple-system, sans-serif" },
      { id: 'clean', name: 'Clean White', initials: 'CW', color1: '#e5e7eb', color2: '#f3f4f6', accent: '#6b7280', dot: '#9ca3af', font: "'Inter', -apple-system, sans-serif", style: 'light' },
    ];

    // Build theme buttons
    const grid = document.getElementById('themeGrid');
    THEMES.forEach((t, i) => {
      const div = document.createElement('div');
      div.className = 'theme-btn';
      div.innerHTML = `<input type="radio" name="theme" id="theme-${t.id}" value="${t.id}" ${i === 0 ? 'checked' : ''} onchange="render()"><label for="theme-${t.id}">${t.name}</label>`;
      grid.appendChild(div);
    });

    function sigHTML(theme, name, role, email, company, website, tagline) {
      if (theme.style === 'terminal') {
        return `<div style="font-family: ${theme.font}; font-size: 12px; color: #0a0a0a; margin-top: 16px; padding-top: 12px;">
  <table cellpadding="0" cellspacing="0" style="border-collapse: collapse;">
    <tr>
      <td style="width: 40px; vertical-align: top; padding-right: 10px;">
        <div style="color: ${theme.accent}; font-size: 22px; line-height: 1; font-weight: 300;">▸</div>
      </td>
      <td style="vertical-align: top;">
        <div style="font-weight: 500; color: #0a0a0a;">${name}</div>
        <div style="color: #777; font-size: 11px; margin-top: 1px;">${role}</div>
        <div style="margin-top: 6px;"><span style="color: #bbb;">[</span><a href="mailto:${email}" style="color: #0a0a0a; text-decoration: none;">${email}</a><span style="color: #bbb;">]</span></div>
        <div><span style="color: #bbb;">[</span><a href="https://${website}" style="color: #0a0a0a; text-decoration: none;">${website}</a><span style="color: #bbb;">]</span></div>
        <div style="margin-top: 4px; color: #ccc; font-size: 10px;">// ${company}</div>
      </td>
    </tr>
  </table>
  <hr style="border: none; border-top: 1px solid #e0e0e0; margin: 8px 0 4px 0;">
  <div style="color: #ccc; font-size: 10px;">$ _</div>
</div>`;
      }

      if (theme.style === 'luxury') {
        return `<div style="font-family: ${theme.font}; font-size: 13px; color: #ccc; margin-top: 16px; padding-top: 12px; border-top: 1px solid #333;">
  <div style="font-weight: 300; font-size: 11px; color: ${theme.accent}; letter-spacing: 3px; text-transform: uppercase;">${company}</div>
  <div style="font-weight: 500; font-size: 15px; color: #fff; margin-top: 4px;">${name}</div>
  <div style="color: #888; font-size: 12px; margin-top: 2px;">${role}</div>
  <div style="margin-top: 6px; color: ${theme.accent}; font-size: 12px;">
    <a href="mailto:${email}" style="color: ${theme.accent}; text-decoration: none;">${email}</a>
  </div>
  <div style="margin-top: 2px;">
    <a href="https://${website}" style="color: #666; text-decoration: none; font-size: 11px;">${website}</a>
  </div>
  ${tagline ? `<div style="margin-top: 6px; font-size: 10px; color: #555; font-style: italic;">"${tagline}"</div>` : ''}
  <div style="margin-top: 6px; color: ${theme.accent}; font-size: 16px;">✦</div>
</div>`;
      }

      if (theme.style === 'dark') {
        return `<div style="font-family: ${theme.font}; font-size: 13px; color: #ccc; background: ${theme.color1}; border-radius: 8px; padding: 16px; margin-top: 12px;">
  <table cellpadding="0" cellspacing="0" style="border-collapse: collapse;">
    <tr>
      <td style="vertical-align: middle; padding-right: 10px;">
        <div style="background: ${theme.color2}; border-radius: 6px; width: 36px; height: 36px;">
          <span style="color: ${theme.accent}; font-weight: 700; font-size: 16px; line-height: 36px; display: block; text-align: center;">${theme.initials}</span>
        </div>
      </td>
      <td style="vertical-align: middle;">
        <div style="font-weight: 600; font-size: 14px; color: #fff;">${name}</div>
        <div style="color: #999; font-size: 11px;">${role}</div>
        <div style="margin-top: 4px;">
          <a href="mailto:${email}" style="color: ${theme.accent}; text-decoration: none; font-size: 12px;">✉ ${email}</a>
        </div>
        <div style="margin-top: 1px;">
          <a href="https://${website}" style="color: #777; text-decoration: none; font-size: 11px;">${website}</a>
        </div>
        <div style="margin-top: 2px; font-size: 10px; color: #555;">${company}</div>
      </td>
    </tr>
  </table>
</div>`;
      }

      if (theme.style === 'light') {
        return `<div style="font-family: ${theme.font}; font-size: 13px; color: #333; margin-top: 16px; padding-top: 12px; border-top: 1px solid #e5e7eb;">
  <div style="font-weight: 600; font-size: 14px; color: #111;">${name}</div>
  <div style="color: #888; font-size: 12px;">${role}</div>
  <div style="margin-top: 6px;">
    <span style="display: inline-block; width: 8px; height: 8px; background: ${theme.accent}; border-radius: 50%; margin-right: 6px;"></span>
    <a href="mailto:${email}" style="color: #333; text-decoration: none;">${email}</a>
  </div>
  <div style="margin-top: 2px; color: #999; font-size: 11px;">${company} &middot; ${website}</div>
  ${tagline ? `<div style="margin-top: 4px; font-size: 11px; color: #bbb;">${tagline}</div>` : ''}
</div>`;
      }

      // Default — logo block style
      return `<div style="font-family: ${theme.font}; font-size: 13px; color: #1a1a1a; border-left: 3px solid ${theme.color1}; padding-left: 16px; margin-top: 12px;">
  <table cellpadding="0" cellspacing="0" style="border-collapse: collapse;">
    <tr>
      <td style="vertical-align: middle; padding-right: 12px;">
        <div style="width: 40px; height: 40px; background: linear-gradient(135deg, ${theme.color1}, ${theme.color2}); border-radius: 8px;">
          <span style="color: #fff; font-weight: 800; font-size: 18px; line-height: 40px; display: block; text-align: center;">${theme.initials}</span>
        </div>
      </td>
      <td style="vertical-align: middle;">
        <div style="font-weight: 700; font-size: 15px; color: ${theme.color1};">${name}</div>
        <div style="color: #555; font-size: 12px;">${role}</div>
        <div style="margin-top: 4px;">
          <a href="mailto:${email}" style="color: ${theme.accent}; text-decoration: none;">✉ ${email}</a>
          <span style="color: #ccc; margin: 0 6px;">|</span>
          <a href="https://${website}" style="color: ${theme.color1}; text-decoration: none;">🌐 ${website}</a>
        </div>
        <div style="margin-top: 2px; font-size: 11px; color: #999;">
          <strong style="color: ${theme.color1};">${company}</strong> — ${tagline}
        </div>
      </td>
    </tr>
  </table>
</div>`;
    }

    function sigPlain(theme, name, role, email, company, website, tagline) {
      if (theme.style === 'terminal') {
        return `▸ ${name} | ${role}\n  [${email}]\n  [${website}]\n  // ${company}\n$ _`;
      }
      if (theme.style === 'luxury') {
        return `${company}\n${name} — ${role}\n${email} | ${website}\n"${tagline}"\n✦`;
      }
      return `--\n${name} | ${role}\n✉ ${email} | ${website}\n${company} — ${tagline}`;
    }

    function getTheme() {
      return THEMES.find(t => t.id === document.querySelector('input[name="theme"]:checked').value);
    }

    function getVals() {
      return {
        name: document.getElementById('name').value || 'Your Name',
        role: document.getElementById('role').value || 'Role',
        email: document.getElementById('email').value || 'email@domain.com',
        company: document.getElementById('company').value || 'Company',
        website: document.getElementById('website').value || 'website.com',
        tagline: document.getElementById('tagline').value || ''
      };
    }

    function render() {
      const v = getVals();
      const theme = getTheme();
      document.getElementById('preview').innerHTML = sigHTML(theme, v.name, v.role, v.email, v.company, v.website, v.tagline);
      document.getElementById('codeOutput').textContent = currentTab === 'html'
        ? sigHTML(theme, v.name, v.role, v.email, v.company, v.website, v.tagline)
        : sigPlain(theme, v.name, v.role, v.email, v.company, v.website, v.tagline);
    }

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('tab-html').classList.toggle('active', tab === 'html');
      document.getElementById('tab-plain').classList.toggle('active', tab === 'plain');
      render();
    }

    function copyCode() {
      const code = document.getElementById('codeOutput').textContent;
      navigator.clipboard.writeText(code).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      });
    }

    render();
  </script>
</body>
</html>
